<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Partnership</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  html, body {
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
  }
</style>
</head>

<body class="bg-slate-50">

<!-- NAV -->
<div class="nav"></div>

<!-- SECTION -->
<section class="py-16 px-4">

  <div class="max-w-4xl mx-auto">

    <!-- HEADING -->
    <div class="text-center mb-10" data-aos="fade-down">
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mt-20 mb-2">
        NGO Partnership Form
      </h1>
      <p class="text-teal-600 font-semibold">
        Join hands with us to serve communities better
      </p>
    </div>

    <!-- FORM CARD -->
    <form id="ngoForm"
action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse"
method="POST"
target="hidden_iframe"
onsubmit="submitted=true;"
class="bg-white shadow-xl rounded-2xl p-6 md:p-10 space-y-6"
data-aos="fade-up">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">NGO Name *</label>
<input type="text" name="entry.1111111111" required
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div>
<label class="text-sm font-medium text-gray-700">Registration Number</label>
<input type="text" name="entry.2222222222"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">Contact Person *</label>
<input type="text" name="entry.3333333333" required
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div>
<label class="text-sm font-medium text-gray-700">Email *</label>
<input type="email" name="entry.4444444444" required
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">Phone *</label>
<input type="tel" name="entry.5555555555" required
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div class="grid grid-cols-2 gap-3">

<div>
<label class="text-sm font-medium text-gray-700">State</label>
<input type="text" name="entry.6666666666"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div>
<label class="text-sm font-medium text-gray-700">City</label>
<input type="text" name="entry.7777777777"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>

</div>

<div>
<label class="text-sm font-medium text-gray-700">About NGO / Work Area</label>
<textarea name="entry.8888888888" rows="4"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
</div>

<div class="text-center pt-4">
<button type="submit"
class="bg-teal-500 hover:bg-teal-600 text-white px-10 py-3 rounded-full font-semibold shadow-md transition">
Submit
</button>
</div>

</form>

<!-- Hidden iframe -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- Success Message -->
<p id="successMessage" class="hidden text-green-600 text-center mt-4 font-semibold">
Form submitted successfully ✅
</p>

  </div>

</section>

<!-- FOOTER -->
<div class="footer"></div>

<script src="./nav.js"></script>
<script src="./footer.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  
var submitted = false;

document.getElementById("ngoForm").addEventListener("submit", function () {
  submitted = true;
});

document.querySelector("iframe[name='hidden_iframe']").onload = function () {
  if (submitted) {
    document.getElementById("successMessage").classList.remove("hidden");
    document.getElementById("ngoForm").reset();
  }
};

AOS.init({ duration: 1000, once: true });
</script>

</body>
</html>
