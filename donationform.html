<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate | We For A Cause</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{
  overflow-x:hidden;
  font-family: system-ui;
}
</style>
</head>

<body>
  <div class="nav"></div>

<section class="py-20 bg-gray-50">
<div class="max-w-4xl mx-auto px-6">

<h2 class="text-4xl font-bold text-center  mt-10 text-teal-600 mb-10">
Donate Now
</h2>

<!-- FORM START -->
<form id="donationForm"
action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse"
method="POST"
target="hidden_iframe"
onsubmit="submitted=true; return validateDonationForm();"
class="bg-white p-8 rounded-2xl shadow-lg grid gap-6">

<input type="text" name="entry.1111111111" placeholder="Full Name" required class="border p-3 rounded-lg">

<input type="email" name="entry.2222222222" placeholder="Email" required class="border p-3 rounded-lg">

<input type="tel" name="entry.3333333333" placeholder="Phone Number" required class="border p-3 rounded-lg">

<input type="text" name="entry.4444444444" placeholder="City" required class="border p-3 rounded-lg">

<input type="text" name="entry.5555555555" placeholder="PAN Number" required class="border p-3 rounded-lg">

<input type="text" name="entry.6666666666" placeholder="Aadhar Number (Optional)" class="border p-3 rounded-lg">

<!-- Amount -->
<div>
<button type="button" onclick="setAmount(500)" class="border px-4 py-2 rounded">₹500</button>
<button type="button" onclick="setAmount(1000)" class="border px-4 py-2 rounded">₹1000</button>
<button type="button" onclick="setAmount(2000)" class="border px-4 py-2 rounded">₹2000</button>

<input type="number" id="amountInput" name="entry.7777777777"
placeholder="Enter Amount" required class="border p-3 rounded-lg w-full mt-3">
</div>

<textarea name="entry.8888888888" placeholder="Message" required class="border p-3 rounded-lg"></textarea>

<button type="submit" class="bg-teal-500 text-white py-3 rounded-lg">
Donate Now
</button>

</form>

<!-- Hidden iframe -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>
</section>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="fixed inset-0 hidden items-center justify-center bg-black/50">
<div class="bg-white p-8 rounded-xl text-center">
<h2 class="text-2xl font-bold text-teal-600 mb-3">Thank You 💖</h2>
<p>Your donation request submitted successfully.</p>
<button onclick="closePopup()" class="mt-4 bg-teal-500 text-white px-6 py-2 rounded">
Close
</button>
</div>
</div>
<div class="footer"></div>
<script src="./nav.js"></script>
<script src="./footer.js"></script>

<script>

var submitted = false;

// Show popup after submit
document.querySelector("iframe[name='hidden_iframe']").onload = function() {
  if(submitted){
    document.getElementById("successPopup").classList.remove("hidden");
    document.getElementById("successPopup").classList.add("flex");
    document.getElementById("donationForm").reset();
  }
};

// Close popup
function closePopup(){
  document.getElementById("successPopup").classList.add("hidden");
}

// Amount buttons
function setAmount(val){
  document.getElementById("amountInput").value = val;
}

// Validation
function validateDonationForm(){
  const phone = document.querySelector("[name='entry.3333333333']").value;

  if(!/^\d{10}$/.test(phone)){
    alert("Enter valid 10 digit phone number");
    return false;
  }

  return true;
}

</script>

</body>
</html>
